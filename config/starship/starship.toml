# Managed by Ansible — do not edit by hand.

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[\u{276f}](purple)"
error_symbol = "[\u{276f}](red)"
vimcmd_symbol = "[\u{276e}](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "\u{200b}"
untracked = "\u{200b}"
modified = "\u{200b}"
staged = "\u{200b}"
renamed = "\u{200b}"
deleted = "\u{200b}"
stashed = "\u{2261}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
