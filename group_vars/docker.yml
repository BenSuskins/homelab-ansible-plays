---
base_dir: /home/docker/server-docker

# AdGuard Home DNS rewrites, rendered into config/adguard/AdGuardHome.yaml.j2.
# Format matches AdGuard's own schema. `answer` may be an IP or a hostname.
# NOTE: the three "answer: A" entries are reproduced from the live config as-is;
# "A" is not a valid IP/hostname, so they are almost certainly inert and the
# *.suskins.co.uk wildcard is what actually resolves those hosts. Give them a
# real answer or delete them.
adguard_rewrites:
  - domain: "authelia.suskins.co.uk"
    answer: "A"
    enabled: true
  - domain: "hub.suskins.co.uk"
    answer: "A"
    enabled: true
  - domain: "wedding.suskins.co.uk"
    answer: "A"
    enabled: true
  - domain: "*.suskins.co.uk"
    answer: "192.168.0.105"
    enabled: true

special_containers:
  - homepage

containers:
  # MCP
  - mcpjungle
  # Apps
  - family-hub
  # - marginalia-postgres
  # - marginalia-api
  # - marginalia-worker-metadata
  # - marginalia-worker-import
  # - marginalia-worker-reviews
  - pubgolf-backend
  - pubgolf-frontend
  - wedding-db
  - wedding-db-backup
  - wedding
  # Infrastructure
  - adguard
  - cloudflare-ddns
