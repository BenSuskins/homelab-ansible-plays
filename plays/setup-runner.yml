---
- name: RUNNER - Setup GitHub Actions runner
  hosts: bumblebee
  become: true
  vars_files:
    - "~/.ansible/vault.yml"

  tasks:
    - name: RUNNER - Validate variables
      ansible.builtin.assert:
        that:
          - runner_install_dir is defined
          - github_org is defined
          - runner_dependencies is defined
          - GITHUB_RUNNER_TOKEN is defined
          - ANSIBLE_VAULT_PASS is defined
        fail_msg: "Required runner variables must be defined"
      tags: [validation]

    - name: RUNNER - Install GitHub Actions dependencies
      block:
        - name: RUNNER - Include GHA dependency tasks
          ansible.builtin.include_tasks:
            file: "../tasks/other/gha_dependencies.yml"
          register: gha_deps_results
      rescue:
        - name: RUNNER - Report dependency install failure
          ansible.builtin.fail:
            msg: "GitHub Actions dependency install failed"
      tags: [packages]

    - name: RUNNER - Setup GitHub Actions runner
      block:
        - name: RUNNER - Include runner tasks
          ansible.builtin.include_tasks:
            file: "../tasks/other/github_runner.yml"
          register: runner_results
      rescue:
        - name: RUNNER - Report runner setup failure
          ansible.builtin.fail:
            msg: "GitHub Actions runner setup failed"
      tags: [runner]

    - name: RUNNER - Reboot if runner changed
      ansible.builtin.reboot:
        msg: "Rebooting server after runner setup"
      when: runner_results is defined and (runner_results.changed | default(false))
      tags: [reboot]
