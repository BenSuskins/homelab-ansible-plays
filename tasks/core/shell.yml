---
- name: SHELL - Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['distribution'] in ["Ubuntu", "Debian"]

- name: SHELL - Download eza GPG key
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
    dest: /etc/apt/keyrings/gierens.asc
    mode: "0644"
  when: ansible_facts['distribution'] in ["Ubuntu", "Debian"]

- name: SHELL - Add eza repository for apt
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/gierens.asc]
      http://deb.gierens.de stable main
    state: present
  when: ansible_facts['distribution'] in ["Ubuntu", "Debian"]

- name: SHELL - Install eza
  ansible.builtin.package:
    name: eza
    state: present

- name: SHELL - Install ncurses-bin (provides tic)
  ansible.builtin.package:
    name: ncurses-bin
    state: present

- name: SHELL - Create terminfo source directory
  ansible.builtin.file:
    path: /etc/terminfo-src
    state: directory
    mode: "0755"

- name: SHELL - Copy ghostty terminfo source
  ansible.builtin.copy:
    src: ../config/terminfo/xterm-ghostty.terminfo
    dest: /etc/terminfo-src/xterm-ghostty.terminfo
    mode: "0644"
  register: ghostty_terminfo

- name: SHELL - Compile ghostty terminfo into system database
  ansible.builtin.command:
    cmd: tic -x -o /etc/terminfo /etc/terminfo-src/xterm-ghostty.terminfo
  when: ghostty_terminfo.changed

- name: SHELL - Install starship prompt
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -sS https://starship.rs/install.sh | sh -s -- -y -b /usr/local/bin
    creates: /usr/local/bin/starship
    executable: /bin/bash

- name: SHELL - Install zoxide
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh -s -- --bin-dir /usr/local/bin
    creates: /usr/local/bin/zoxide
    executable: /bin/bash

- name: SHELL - Set zsh as login shell
  ansible.builtin.user:
    name: "{{ username }}"
    shell: /usr/bin/zsh

- name: SHELL - Template .zshrc
  ansible.builtin.template:
    src: ../config/zsh/zshrc.j2
    dest: "/home/{{ username }}/.zshrc"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: SHELL - Create config directory
  ansible.builtin.file:
    path: "/home/{{ username }}/.config"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: SHELL - Copy starship config
  ansible.builtin.copy:
    src: ../config/starship/starship.toml
    dest: "/home/{{ username }}/.config/starship.toml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
