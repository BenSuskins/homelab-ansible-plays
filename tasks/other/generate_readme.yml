---
- name: DOCS - Ensure docs/ directory exists
  ansible.builtin.file:
    path: "../docs"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true

- name: DOCS - Generate ARCHITECTURE.md (deployed-services appendix is dynamic)
  ansible.builtin.template:
    src: ../config/readme/ARCHITECTURE.md.j2
    dest: "../docs/ARCHITECTURE.md"
    mode: "0644"
  delegate_to: localhost
  become: false
  run_once: true
