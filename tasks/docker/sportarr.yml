---
- name: SPORTARR - Create directory and permissions
  ansible.builtin.file:
    path: "{{ item }}"
    recurse: true
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - "{{ base_dir }}/sportarr"

- name: SPORTARR - Create container
  community.docker.docker_container:
    name: sportarr
    image: sportarr/sportarr:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "1867:1867"
    volumes:
      - "{{ base_dir }}/sportarr:/config"
      - "/mnt/media:/sports"
    env:
      PUID: "{{ puid | string }}"
      PGID: "{{ pgid | string }}"
      TZ: "{{ timezone }}"

- name: SPORTARR - Define service entry
  ansible.builtin.set_fact:
    sportarr_entry:
      name: sportarr
      description: Sports media management
      host: "sportarr.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 1867
      scheme: http
      secured: true
      healthcheck: true
      homepage: true
      proxied: true

- name: SPORTARR - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [sportarr_entry] }}"
