---
- name: RADARR-MCP - Create container
  community.docker.docker_container:
    name: radarr-mcp
    image: ghcr.io/bensuskins/radarr-mcp:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "4200:4200"
    env:
      RADARR_URL: "http://{{ mediaserver_ip }}:7878"
      RADARR_API_KEY: "{{ RADARR_API_KEY }}"
      RADARR_MCP_HOST: "0.0.0.0"
      RADARR_MCP_PORT: "4200"

- name: RADARR-MCP - Register with mcpjungle gateway
  community.docker.docker_container_exec:
    container: mcpjungle
    command: >-
      mcpjungle register --name radarr
      --description "Radarr MCP server"
      --url http://{{ inventory_hostname }}:4200/mcp
  register: radarr_mcp_register
  changed_when: false
  failed_when: false

- name: RADARR-MCP - Define service entry
  ansible.builtin.set_fact:
    radarr_mcp_entry:
      name: radarr-mcp
      description: Radarr MCP server
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 4200
      scheme: http
      healthcheck: true
      healthcheck_path: /mcp

- name: RADARR-MCP - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [radarr_mcp_entry] }}"
