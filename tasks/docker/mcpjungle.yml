---
- name: MCPJUNGLE - Create directory and permissions
  ansible.builtin.file:
    path: "{{ base_dir }}/mcpjungle"
    recurse: true
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"

- name: MCPJUNGLE - Create container
  community.docker.docker_container:
    name: mcpjungle
    image: ghcr.io/mcpjungle/mcpjungle:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "8090:8080"
    volumes:
      - "{{ base_dir }}/mcpjungle:/data"

- name: MCPJUNGLE - Define service entry
  ansible.builtin.set_fact:
    mcpjungle_entry:
      name: mcpjungle
      description: MCP gateway
      host: "mcp.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 8090
      scheme: http
      secured: true
      healthcheck: true
      homepage: true
      proxied: true

- name: MCPJUNGLE - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [mcpjungle_entry] }}"
