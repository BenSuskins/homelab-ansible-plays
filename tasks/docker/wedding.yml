---
- name: WEDDING - Create directory and permissions
  ansible.builtin.file:
    path: "{{ item }}"
    recurse: true
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - "{{ base_dir }}/wedding/uploads"

- name: WEDDING - Create container
  community.docker.docker_container:
    name: wedding
    image: ghcr.io/bensuskins/wedding:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "3004:3000"
    volumes:
      - "{{ base_dir }}/wedding/uploads:/app/public/uploads"
    env:
      DATABASE_URL: "postgresql://postgres:{{ WEDDING_DB_PASSWORD }}@wedding-db:5432/wedding?schema=public"
      INVITE_TOKEN_SECRET: "{{ WEDDING_INVITE_TOKEN_SECRET }}"
      AUTH_SECRET: "{{ WEDDING_AUTH_SECRET }}"
      OIDC_ISSUER: "https://authelia.{{ domain }}"
      OIDC_CLIENT_ID: wedding-admin
      OIDC_CLIENT_SECRET: "{{ AUTHELIA_OIDC_WEDDING_SECRET }}"
      AUTH_URL: "https://wedding.{{ domain }}"
      AUTH_TRUST_HOST: "true"
      PUBLIC_BASE_URL: "https://wedding.{{ domain }}"

- name: WEDDING - Define service entry
  ansible.builtin.set_fact:
    wedding_entry:
      name: wedding
      description: Wedding website
      host: "wedding.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 3004
      scheme: http
      secured: false
      healthcheck: true
      healthcheck_path: /api/healthz
      homepage: true
      proxied: true

- name: WEDDING - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [wedding_entry] }}"
