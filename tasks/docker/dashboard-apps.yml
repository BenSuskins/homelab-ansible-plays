---
- name: DASHBOARD - Create directory
  ansible.builtin.file:
    path: /opt/data/apps
    state: directory
    mode: '0755'

- name: DASHBOARD - Create App Host container
  community.docker.docker_container:
    name: dashboard-app-host
    image: python:3.13-slim
    restart_policy: always
    state: started
    command: python3 /opt/data/apps/host.py
    ports:
      - "8080:8080"
    volumes:
      - "{{ base_dir }}/apps:/opt/data/apps"
    networks:
      - name: homelab

- name: DASHBOARD - Define service entry
  ansible.builtin.set_fact:
    dashboard_entry:
      name: dashboard-app-host
      description: Generic App Host for mini-dashboards
      icon: python
      host: "dashboards.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 8080
      scheme: http
      secured: true
      homepage: true
      proxied: true

- name: DASHBOARD - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [dashboard_entry] }}"
