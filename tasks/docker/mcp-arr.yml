---
- name: MCP-ARR - Create container
  community.docker.docker_container:
    name: mcp-arr
    image: ghcr.io/bensuskins/mcp-arr:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "3000:3000"
    env:
      NAS_IP: "{{ inventory_hostname }}"
      SONARR_API_KEY: "{{ SONARR_API_KEY }}"
      SONARR_PORT: "8989"
      RADARR_API_KEY: "{{ RADARR_API_KEY }}"
      RADARR_PORT: "7878"
      MCP_SERVER_PORT: "3000"

- name: MCP-ARR - Define service entry
  ansible.builtin.set_fact:
    mcp_arr_entry:
      name: mcp-arr
      description: Arr suite MCP server
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 3000
      scheme: http
      healthcheck: true
      healthcheck_path: /health

- name: MCP-ARR - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [mcp_arr_entry] }}"
