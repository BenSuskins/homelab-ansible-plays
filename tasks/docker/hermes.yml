---
- name: HERMES - Create directory and permissions
  ansible.builtin.file:
    path: "{{ base_dir }}/hermes/data"
    recurse: true
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"

- name: HERMES - Create config
  ansible.builtin.template:
    src: ../config/hermes/cli-config.yaml.j2
    dest: "{{ base_dir }}/hermes/data/cli-config.yaml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: HERMES - Create container
  community.docker.docker_container:
    name: hermes
    image: nousresearch/hermes-agent:v2026.6.19
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - "{{ base_dir }}/hermes/data:/opt/data"
    env:
      HERMES_DASHBOARD: "1"
      OPENROUTER_API_KEY: "{{ OPENROUTER_API_KEY }}"

- name: HERMES - Define service entry
  ansible.builtin.set_fact:
    hermes_entry:
      name: hermes
      description: Hermes AI agent
      icon: hermes
      host: "hermes.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 9119
      scheme: http
      secured: true
      homepage: true
      proxied: true
      healthcheck: true

- name: HERMES - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [hermes_entry] }}"
