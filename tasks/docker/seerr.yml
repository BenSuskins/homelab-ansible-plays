---
- name: SEERR - Create directory and permissions
  ansible.builtin.file:
    path: "{{ item }}"
    recurse: true
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - "{{ base_dir }}/overseer"

- name: SEERR - Create container
  community.docker.docker_container:
    name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    restart_policy: always
    state: started
    pull: true
    networks:
      - name: homelab
    ports:
      - "5055:5055"
    volumes:
      - "{{ base_dir }}/overseer:/app/config"
    env:
      PUID: "{{ puid | string }}"
      PGID: "{{ pgid | string }}"
      TZ: "{{ timezone }}"

- name: SEERR - Define service entry
  ansible.builtin.set_fact:
    seerr_entry:
      name: seerr
      host: "seerr.{{ domain }}"
      ip: "{{ inventory_hostname }}"
      friendly_name: "{{ friendly_name }}"
      port: 5055
      scheme: http
      secured: true
      healthcheck: true
      homepage: true
      proxied: true
      exposed: false

- name: SEERR - Append to docker_services
  ansible.builtin.set_fact:
    docker_services: "{{ docker_services + [seerr_entry] }}"
