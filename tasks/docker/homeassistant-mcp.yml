---
- name: HOMEASSISTANT-MCP - Register with mcpjungle gateway
  community.docker.docker_container_exec:
    container: mcpjungle
    command: >-
      mcpjungle register --name homeassistant
      --description "Home Assistant MCP server"
      --url {{ HOMEASSISTANT_MCP_SERVER_URL }}
  register: homeassistant_mcp_register
  changed_when: false
  failed_when: false
