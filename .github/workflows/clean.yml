name: Clean Homelab

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: self-hosted
    steps:
      - name: Cleanup workspace
        run: rm -rf "${{ github.workspace }}"/*

      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Checkout secrets repo
        uses: actions/checkout@v7
        with:
          repository: bensuskins/secrets
          path: secrets
          token: ${{ secrets.SECRETS_REPO_TOKEN }}

      - name: Setup secrets
        run: |
          mkdir -p ~/.ansible
          mv secrets/vault.yml ~/.ansible/vault.yml
          echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > ~/.ansible_vault_pass
          chmod 600 ~/.ansible_vault_pass ~/.ansible/vault.yml

      - name: Run Ansible
        run: |
          ansible-playbook plays/clean.yml --vault-password-file ~/.ansible_vault_pass 2>&1 | tee /tmp/ansible_output.txt

      - name: Post to job summary
        if: always()
        run: |
          echo '### Ansible Clean Output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/ansible_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f ~/.ansible_vault_pass ~/.ansible/vault.yml
