name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
  TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}

jobs:
  plan-pr:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        dir: [cloudflare, proxmox]
    defaults:
      run:
        working-directory: terraform/${{ matrix.dir }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        continue-on-error: true

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          script: |
            const dir = '${{ matrix.dir }}';
            const marker = `<!-- terraform-plan:${dir} -->`;

            const stdout = process.env.PLAN_STDOUT || '';
            const stderr = process.env.PLAN_STDERR || '';
            let output = (stdout + (stderr ? `\n${stderr}` : '')).trim() || 'No output.';

            const limit = 60000;
            if (output.length > limit) {
              output = output.slice(0, limit) + '\n... (truncated — see the job log for the full plan)';
            }

            const body = [
              marker,
              `### Terraform Plan — \`${dir}\``,
              '',
              `| Step | Result |`,
              `| --- | --- |`,
              `| Format | \`${{ steps.fmt.outcome }}\` |`,
              `| Validate | \`${{ steps.validate.outcome }}\` |`,
              `| Plan | \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if format, validate or plan failed
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: |
          echo "fmt=${{ steps.fmt.outcome }} validate=${{ steps.validate.outcome }} plan=${{ steps.plan.outcome }}"
          exit 1

  plan:
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        dir: [cloudflare, proxmox]
    defaults:
      run:
        working-directory: terraform/${{ matrix.dir }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Post plan to job summary
        run: |
          echo "### Terraform Plan (${{ matrix.dir }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ matrix.dir }}
          path: terraform/${{ matrix.dir }}/tfplan

  apply:
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    needs: plan
    environment: production
    strategy:
      fail-fast: false
      matrix:
        dir: [cloudflare, proxmox]
    defaults:
      run:
        working-directory: terraform/${{ matrix.dir }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ matrix.dir }}
          path: terraform/${{ matrix.dir }}

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Post apply to job summary
        if: always()
        run: |
          echo "### Terraform Apply Output (${{ matrix.dir }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
